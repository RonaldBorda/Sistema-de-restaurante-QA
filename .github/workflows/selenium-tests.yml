name: Selenium Testson:  push:    branches: [ main, master ]  pull_request:    branches: [ main, master ]jobs:  test:    runs-on: ubuntu-latest    steps:      - name: Descargar repositorio        uses: actions/checkout@v4      - name: Configurar Java        uses: actions/setup-java@v4        with:          distribution: temurin          java-version: 17      - name: Instalar Chrome        uses: browser-actions/setup-chrome@v1      - name: Ejecutar pruebas Selenium        run: mvn test